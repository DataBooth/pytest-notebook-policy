[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-toml"
[[repos]]
repo = "local"

[[repos.hooks]]
id = "text-safety-check"
name = "text-safety-check"
entry = "uv run python scripts/check_text_safety.py"
language = "system"
files = "\\.(py|md|txt|toml|ya?ml|json|qmd|ini|cfg|lock|csv|ipynb)$"
pass_filenames = true

[[repos.hooks]]
id = "python-sql-literal-check"
name = "python-sql-literal-check"
entry = "uv run python scripts/check_python_sql_literals.py"
language = "system"
files = "\\.py$"
pass_filenames = true

[[repos.hooks]]
id = "ruff-check"
name = "ruff-check"
entry = "uv run ruff check src tests"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "pytest-tests"
name = "pytest-tests"
entry = "uv run python -m pytest tests"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "pytest-report-regressions"
name = "pytest-report-regressions"
entry = "uv run python -m pytest tests/test_quality.py tests/test_report_regressions.py"
language = "system"
pass_filenames = false
